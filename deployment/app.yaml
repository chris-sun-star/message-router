apiVersion: v1
kind: Service
metadata:
  name: message-router
spec:
  selector:
    app: message-router
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-router
spec:
  replicas: 2
  selector:
    matchLabels:
      app: message-router
  template:
    metadata:
      labels:
        app: message-router
    spec:
      containers:
        - name: message-router
          image: message-router:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config-volume
              mountPath: /root/config.yaml
              subPath: config.yaml
          env:
            - name: CONFIG_PATH
              value: "/root/config.yaml"
      volumes:
        - name: config-volume
          configMap:
            name: message-router-config
