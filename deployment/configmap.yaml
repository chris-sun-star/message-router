apiVersion: v1
kind: ConfigMap
metadata:
  name: message-router-config
data:
  config.yaml: |
    server:
      port: "8080"
    database:
      type: "mysql"
      dsn: "user:password@tcp(mysql:3306)/message_router?charset=utf8mb4&parseTime=True&loc=Local"
    jwt:
      secret: "CHANGE_ME_JWT_SECRET"
    encryption:
      key: "CHANGE_ME_32_BYTE_ENCRYPTION_KEY"
    channels:
      telegram:
        api_id: 0
        api_hash: ""
      lark:
        app_id: ""
        app_secret: ""
        domain: "https://open.larksuite.com"
    network:
      proxy: ""
